apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-devops-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-devops-app
  template:
    metadata:
      labels:
        app: ai-devops-app
    spec:
      containers:
      - name: ai-devops-app
        image: tekstacuser/ai-devops-app:dfc3fd6a421cc09b089d14d0f724b2401f4c34b5
        ports:
        - containerPort: 5000
