apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-devops-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-devops-app
  template:
    metadata:
      labels:
        app: ai-devops-app
    spec:
      containers:
      - name: ai-devops-app
        image: your-dockerhub-username/ai-devops-app:latest
        ports:
        - containerPort: 5000
